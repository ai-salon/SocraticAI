<!DOCTYPE html>

<meta charset="utf-8">

  html, body { margin: 0; padding: 0; background: white; }
  canvas { display: block; }

'use strict';

// ── Canvas setup (2× for retina) ─────────────────────────────────────────────
const W = 494, H = 345, DPR = 2;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.scale(DPR, DPR);

// ── Seeded RNG (mulberry32) ──────────────────────────────────────────────────
function mkRng(seed) {
  let s = seed >>> 0;
  return () => {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = Math.imul(s ^ (s >>> 15), 1 | s);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ── Network geometry ──────────────────────────────────────────────────────────
// The original network circle is a 2000×2000px PNG scaled to fit a 450-unit
// square rotated 45° around SVG point (318.438, -145.938). The inscribed circle
// has center ≈ (318, 172) and radius ≈ 225 in SVG coordinates.
const CX = 319, CY = 184, SCALE = 112;
const R_MIN = 0.75 * SCALE;  // inner ring edge
const R_MAX = 1.25 * SCALE;  // outer ring edge
const MAX_DIST = 0.27 * SCALE;
const MAX_NBRS = 5;
const N_PTS = 600;
const DRIFT_AMP = 0.04 * SCALE;
const PERIOD_MS = 3200;
const PULSE_SIGMA = 0.45;
const BASE_BRIGHT = 0.76;  // dim (light grey for black-on-white variant)
const PEAK_BRIGHT = 0.0;   // bright = black

// Indices 0-12 in the PINNED array.
const PINNED = [
  // idx 0 — large upper node
  { x: 119.721, y: 111.389, r: 4.89, fill: 'black' },
  // idx 1 — hub
  { x: 135.332, y: 122.0,   r: 3.5,  fill: 'black' },

  { x: 153.332, y: 125.0,   r: 2.0,  fill: 'black' },

  { x: 187.937, y: 111.5,   r: 1.0,  fill: 'black' },
  // idx 7 — gateway (just above "i" stem)
  { x: 109.332, y: 168.0,   r: 2.5,  fill: 'black' },
  // idx 8 — white "hole" in i
  { x: 88.332,  y: 175.0,   r: 3.5,  fill: 'white' },

// Forced connections between pinned nodes (exactly from SVG lines).
// Pairs are [pinnedIndexA, pinnedIndexB].
const FORCED = [
  [1, 0],   // 135 → 119  (line 41)
  [1, 3],   // 135 → 164  (line 42)
  [1, 2],   // 135 → 153  (line 43)
  [3, 2],   // 164 → 153  (line 44)
  [4, 3],   // 173 → 164  (line 45)
  [3, 5],   // 164 → 179  (line 47)
  [6, 5],   // 188 → 179  (line 49)
  [8, 7],   // white 88 → gateway 109  (line 36)
  [9, 7],   // white 93 → gateway 109  (line 37)
  [8, 9],   // white 88 → white 93     (line 38)
  [9, 10],  // white 93 → white 85     (line 39)
  [11, 10], // white 92 → white 85     (line 40)
  [12, 0],  // i-dot → upper node 119  (line 57)
  [12, 7],  // i-dot → gateway 109     (line 58)
  [8, 12],  // white 88 → i-dot        (line 59)
];

// ── Build network ─────────────────────────────────────────────────────────────
function buildNetwork() {
  const rng = mkRng(42);
  const pts = [];

  // Generate random ring nodes
  for (let i = 0; i < N_PTS; i++) {
    const r     = R_MIN + rng() * (R_MAX - R_MIN);
    const theta = rng() * 2 * Math.PI;
    const dp    = rng() * 2 * Math.PI;  // drift phase
    const da    = rng() * 2 * Math.PI;  // drift direction
    pts.push({
      x0: CX + r * Math.cos(theta),
      y0: CY + r * Math.sin(theta),
      x: 0, y: 0,
      r: 1.5, fill: 'black',
      pinned: false, dp, dax: Math.cos(da), day: Math.sin(da),
    });
  }

  // Append pinned extension nodes
  const pinnedStart = pts.length;
  for (const p of PINNED) {
    pts.push({ x0: p.x, y0: p.y, x: p.x, y: p.y,
               r: p.r, fill: p.fill, pinned: true, dp: 0, dax: 0, day: 0 });
  }
  for (const p of pts) { p.x = p.x0; p.y = p.y0; }

  // Proximity connections
  const rng2 = mkRng(42);
  const pairs = [];
  const seen = new Set();
  const addPair = (a, b) => {
    const key = Math.min(a,b) * 100000 + Math.max(a,b);
    if (!seen.has(key)) { seen.add(key); pairs.push([a, b]); }
  };

  for (let i = 0; i < pts.length; i++) {
    const nbrs = [];
    for (let j = 0; j < pts.length; j++) {
      if (i === j) continue;
      const dx = pts[i].x0 - pts[j].x0, dy = pts[i].y0 - pts[j].y0;
      if (dx*dx + dy*dy < MAX_DIST*MAX_DIST) nbrs.push(j);
    }
    // shuffle
    for (let k = nbrs.length - 1; k > 0; k--) {
      const j = Math.floor(rng2() * (k+1));
      [nbrs[k], nbrs[j]] = [nbrs[j], nbrs[k]];
    }
    for (let k = 0; k < Math.min(MAX_NBRS, nbrs.length); k++) addPair(i, nbrs[k]);
  }

  // Forced pinned-node connections
  for (const [pi, pj] of FORCED) addPair(pinnedStart + pi, pinnedStart + pj);

  // Tag each pair as "over-letter" if either endpoint is a y>140 pinned node.
  // These are redrawn on top of the letter fills.
  const iLetterArea = new Set(
    PINNED.map((p, i) => p.y > 140 ? pinnedStart + i : -1).filter(i => i >= 0)
  );
  const overLetterPairs = pairs.filter(([a,b]) => iLetterArea.has(a) || iLetterArea.has(b));

  return { pts, pairs, overLetterPairs, pinnedStart };
}

const { pts, pairs, overLetterPairs } = buildNetwork();

// ── Draw helpers ─────────────────────────────────────────────────────────────
function angleDiff(a, wave) {
  // JS % preserves sign — add 2π before mod to handle negative angles (top half)
  let d = ((a - wave) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  if (d > Math.PI) d -= 2 * Math.PI;
  return d;
}

function drawEdges(edgeList, wave, tailWave) {
  for (const [i, j] of edgeList) {
    const mx = (pts[i].x + pts[j].x) / 2;
    const my = (pts[i].y + pts[j].y) / 2;
    const isPinned = pts[i].pinned || pts[j].pinned;
    let b;
    if (isPinned && (pts[i].pinned && pts[i].y > 140 || pts[j].pinned && pts[j].y > 140)) {
      // tail edges: small separate pulse based on distance from CX,CY
      const dist = Math.hypot(mx - CX, my - CY);
      const norm = dist / SCALE;
      let td = ((norm - tailWave) % 1 + 1) % 1;
      if (td > 0.5) td = 1 - td;
      b = BASE_BRIGHT + (PEAK_BRIGHT - BASE_BRIGHT) * Math.exp(-td * td / 0.02) * 0.4;
    } else {
      const diff = angleDiff(Math.atan2(my - CY, mx - CX), wave);
      b = BASE_BRIGHT + (PEAK_BRIGHT - BASE_BRIGHT) *
          Math.exp(-diff * diff / (2 * PULSE_SIGMA * PULSE_SIGMA));
    }
    const c = (b * 255) | 0;
    ctx.strokeStyle = `rgb(${c},${c},${c})`;
    ctx.beginPath();
    ctx.moveTo(pts[i].x, pts[i].y);
    ctx.lineTo(pts[j].x, pts[j].y);
    ctx.stroke();
  }
}

function drawNodes(pinnedOnly) {
  ctx.fillStyle = 'black';
  for (const p of pts) {
    if (p.fill === 'white') continue;
    if (pinnedOnly && !p.pinned) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
    ctx.fill();
  }
  ctx.fillStyle = 'white';
  for (const p of pts) {
    if (p.fill !== 'white') continue;
    if (pinnedOnly && !p.pinned) continue;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
    ctx.fill();
  }
}

// ── Animation ────────────────────────────────────────────────────────────────
let t0 = null;

function frame(ts) {
  if (!t0) t0 = ts;
  const t = ((ts - t0) % PERIOD_MS) / PERIOD_MS;
  const wave = 2 * Math.PI * t;
  const tailWave = (t * 1.5) % 1;  // slower independent pulse along tail

  for (const p of pts) {
    if (p.pinned) continue;
    const d = DRIFT_AMP * Math.sin(2 * Math.PI * t + p.dp);
    p.x = p.x0 + d * p.dax;
    p.y = p.y0 + d * p.day;
  }

  ctx.clearRect(0, 0, W, H);
  ctx.lineWidth = 0.3;

  // 1. All edges behind letters
  drawEdges(pairs, wave, tailWave);

  // 2. All ring nodes behind letters
  drawNodes(false);

  // 3. Letter fills (covers ring edges and nodes that overlap letters)
  ctx.fillStyle = 'black';
  for (const lp of LETTERS) ctx.fill(lp);

  // 4. Tail/over-letter edges on top of letter fills
  ctx.lineWidth = 0.5;
  drawEdges(overLetterPairs, wave, tailWave);
  ctx.lineWidth = 0.3;

  // 5. Pinned nodes on top of letters
  drawNodes(true);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
